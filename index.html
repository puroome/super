<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>시험감독 배정</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">

  <link rel="stylesheet" href="css/style.css">
</head>
<body oncontextmenu="return false">

<div id="loading">⏳ 불러오는 중...</div>
<div id="toast"></div>

<!-- 로그인 관문 (로그인/권한 통과 전까지 전체 화면을 덮음) -->
<style>
  .auth-gate{position:fixed;inset:0;z-index:9999;background:#f4f6fb;display:flex;align-items:center;justify-content:center}
  .auth-box{background:#fff;border:1px solid #e0e6ef;border-radius:14px;padding:36px 40px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.08);max-width:340px}
  .auth-logo{font-size:40px;line-height:1;margin-bottom:6px}
  .auth-box h2{margin:0 0 6px;font-size:20px;color:#1f2937}
  .auth-box p{color:#6b7280;font-size:13px;margin:6px 0}
  .auth-login-btn{margin-top:16px;display:inline-flex;align-items:center;gap:10px;padding:11px 18px;border:1px solid #d0d7e3;border-radius:8px;background:#fff;color:#3c4043;font-size:14px;font-weight:600;cursor:pointer}
  .auth-login-btn:hover{background:#f7f9fc}
  .auth-msg{color:#dc2626;font-size:12.5px;min-height:16px;margin-top:12px}
  .auth-user-badge{font-size:12.5px;color:#fff;margin:0 0px;align-self:center}
</style>
<div id="auth-gate" class="auth-gate" style="display:flex">
  <div class="auth-box">
    <div class="auth-logo">🏫</div>
    <h2>감독 자동배정</h2>
    <p id="auth-checking">접속 확인 중...</p>
    <button id="login-btn" class="auth-login-btn" style="display:none">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.02-3.7H.96v2.34A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.98 10.72a5.4 5.4 0 0 1 0-3.44V4.94H.96a9 9 0 0 0 0 8.12l3.02-2.34z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .96 4.94l3.02 2.34C4.68 5.16 6.66 3.58 9 3.58z"/>
      </svg>
      Google 계정으로 로그인
    </button>
    <p id="auth-msg" class="auth-msg"></p>
  </div>
</div>

<!-- 저장함 목록 모달 -->
<div id="load-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3>📂 저장된 데이터 불러오기</h3>
    <div id="load-list"></div>
    <button class="btn-outline" onclick="closeLoadModal()" style="margin-top:12px">닫기</button>
  </div>
</div>

<!-- 오류 안내 모달 -->
<div id="error-modal" class="modal-overlay" style="display:none" onclick="closeErrorModal(event)">
  <div class="modal-box error-modal-box">
    <div class="error-modal-header">
      <span id="error-modal-icon">⚠️</span>
      <h3 id="error-modal-title"></h3>
    </div>
    <div id="error-modal-body"></div>
    <div style="text-align:right;margin-top:16px">
      <button class="btn-primary" onclick="document.getElementById('error-modal').style.display='none'">확인</button>
    </div>
  </div>
</div>

<!-- 섹션별 도움말 모달 (각 섹션 제목 옆 ? 버튼이 여는 공용 모달) -->
<style>
  /* 섹션 제목 옆 ? 버튼 */
  .help-btn{
    width:19px;height:19px;border-radius:50%;
    border:1.5px solid #2563eb;background:#fff;color:#2563eb;
    font-size:12px;font-weight:700;line-height:1;cursor:pointer;padding:0;
    display:inline-flex;align-items:center;justify-content:center;
    vertical-align:middle;margin-left:7px;transition:background .12s,color .12s;
  }
.help-btn:hover{background:#2563eb;color:#fff}

  .logout-btn{
    width:30px;
    height:30px;
    border-radius:50%;
    border:none;
    background:#e5e7eb;
    color:#4b5563;
    cursor:pointer;
    padding:0;
    margin-left:-4px;
    align-self:center;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }
  .logout-btn:hover{background:#d1d5db}
  .logout-btn svg{width:16px;height:16px}
  #help-modal .modal-box{width:560px;max-width:92vw}
  .help-list{display:flex;flex-direction:column;gap:15px}
  .help-row .help-desc{margin-top:5px;color:#4b5563;font-size:13px;line-height:1.6}
  .help-desc b{color:#1f2937}

  /* 버튼 이름 칩 — 실제 버튼 색과 동일 */
  .hk{display:inline-block;border-radius:6px;padding:2px 10px;font-size:12.5px;font-weight:700;white-space:nowrap;border:1px solid transparent;line-height:1.5}
  .hk-primary {background:#6f7ba0;color:#fff}                       /* 저장·추가·실행 */
  .hk-danger  {background:#e53935;color:#fff}                       /* 초기화·배정취소 */
  .hk-soft    {background:#e88a8a;color:#fff}                       /* 변경취소 */
  .hk-outline {background:#fff;border-color:#6f7ba0;color:#6f7ba0}  /* 불러오기·교환·모드 */
  .hk-csvup   {background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}/* CSV 올리기 */
  .hk-csvdown {background:#fffde7;border-color:#ffe082;color:#f57f17}/* CSV 받기 */
  .hk-action  {background:#eef1f6;border-color:#d7deea;color:#4b5563}/* 셀 더블클릭 등 동작 */

  /* CSV 회색 설명 박스 */
  .help-note{font-size:12.5px;line-height:1.75;color:#4b5563;background:#f7f9fc;border:1px solid #e6ebf3;border-radius:8px;padding:11px 13px;margin-top:2px}
  .help-note .nt-h{font-weight:700;color:#1f2937;display:block;margin-bottom:5px}
  .help-note b{color:#1f2937}
  .help-warn{margin-top:9px;padding-top:9px;border-top:1px dashed #dbe2ec}
  .help-warn .nt-warn{color:#b91c1c;font-weight:700}
</style>

<div id="help-modal" class="modal-overlay" style="display:none"
     onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box">
    <div id="help-body"></div>
    <div style="text-align:right;margin-top:14px">
      <button class="btn-primary"
        onclick="document.getElementById('help-modal').style.display='none'">닫기</button>
    </div>
  </div>
</div>

<script>
  // 섹션 키 → 도움말 내용. 제목 옆 ? 버튼이 openHelp(키)로 이 내용을 띄운다.
  const HELP = {
    rooms: `
      <div class="help-list">
        <div class="help-row"><span class="hk hk-primary">+ 날짜 추가</span>
          <div class="help-desc">시험 날짜 한 줄씩 추가 (날짜, 시작교시, 종료교시 입력)</div></div>
        <div class="help-row"><span class="hk hk-csvup">고사실CSV 올리기</span>
          <div class="help-desc">고사실 목록을 CSV로 업로드</div></div>
        <div class="help-row"><span class="hk hk-csvdown">고사실 CSV 양식 받기</span>
          <div class="help-desc">작성용 CSV 양식 내려받기 (현재 입력 내용 포함)</div></div>
        <div class="help-row"><span class="hk hk-danger">초기화</span>
          <div class="help-desc">시험일 및 고사실 영역만 비우기</div></div>
        <div class="help-note">
          <span class="nt-h">📄 CSV 열 설명</span>
          · <b>고사실명</b> : 고사실 이름 (예: 201, 3년 후반 복도)<br>
          · <b>부감독</b> : 값(예: 1)이 있으면 <b style="color:#d97706">부감독실</b>, 비우면 <b style="color:#16a34a">정감독실</b>
          <div class="help-warn">
            <span class="nt-warn">⚠️ 주의</span><br>
            · 고사실은 <b>CSV로만 등록</b> 가능 (개별 추가 버튼 없음)
          </div>
        </div>
      </div>`,

    roles: `
      <div class="help-list">
        <div class="help-row"><span class="hk hk-action">업무강도</span>
          <div class="help-desc">각 감독유형의 부담 크기 입력 (정감독 100 고정, 부감독만 조절)</div></div>
        <div class="help-row"><span class="hk hk-outline">부감독 비활성화</span>
          <div class="help-desc">부감독 없이 전원 정감독 배정 (다시 누르면 부감독 사용)</div></div>
        <div class="help-note">
          업무강도? 감독유형에 따른 <b>상대적</b> 업무량으로, 자동배정시 우선 고려사항<br>
        </div>
      </div>`,

    teachers: `
      <div class="help-list">
        <div class="help-row"><span class="hk hk-primary">+ 교사 추가</span>
          <div class="help-desc">빈 줄 추가 후 직접 입력<br>
          <b>이름, 이전누적업무강도, 제외고사실</b>만 직접 입력
         </div></div>
        <div class="help-row"><span class="hk hk-csvup">CSV 올리기</span>
          <div class="help-desc">CSV로 한 번에 입력<br>
	<b>제외시간, 고정시간, 감독유형</b>까지 포함한 모든 자료를 CSV로 업로드<br>
	</div></div>
        <div class="help-row"><span class="hk hk-csvdown">CSV 양식 받기</span>
          <div class="help-desc">작성용 CSV 양식 내려받기 (현재 입력 내용 포함)</div></div>
        <div class="help-row"><span class="hk hk-outline">📊 이전누적강도 불러오기</span>
          <div class="help-desc">저장된 이전 자료에서 누적강도만 불러와서 채우기</div></div>
        <div class="help-row"><span class="hk hk-danger">초기화</span>
          <div class="help-desc">교사 목록만 비우기</div></div>
        <div class="help-note">
          <span class="nt-h">📄 CSV 열 설명</span>
          · <b>이름</b> : 교사 이름<br>
          · <b>이전누적업무강도</b> : 지난 시험까지 쌓인 업무량 합계<br>
          · <b>제외고사실</b> : 배정 금지 고사실 (본인 담임반 등)<br>
          · <b>제외시간</b> : 감독 불가 시간 (출장 등), 여러 개는 쉼표로 구분<br>
          · <b>고정시간</b> : 반드시 감독할 시간 (담당과목시간 등)<br>
          · <b>감독유형</b> : 고정된 시간의 감독유형 (<b>1 = 정감독, 2 = 부감독</b>)
          <div class="help-warn">
            <span class="nt-warn">⚠️ 꼭 지킬 규칙</span><br>
            · 시간 형식 = <b>일+교시 두 자리</b> (예: 1일차 2교시 → <b>12</b>), 여러 개는 쉼표로 구분<br>
            · <b>고정시간</b>과 <b>감독유형</b>은 하나로 묶인 데이터로, 입력된 값의 개수가 동일해야함<br>
            · <b>제외시간, 고정시간 및 감독유형</b>은 비워두고 <b>[자동배정] 탭에서 직접 지정</b> 가능
          </div>
        </div>
      </div>`,

    req: `
      <div class="help-list">
          <div class="help-desc">
            <span style="color:#16a34a;font-weight:700">■ 정감독 배치실</span> &nbsp;&nbsp;
            <span style="color:#d97706;font-weight:700">■ 부감독 배치실</span>
          </div>
        <div class="help-row"><span class="hk hk-action">셀 더블클릭</span>
          <div class="help-desc">저장한 고사실에 <b>감독배정 ↔ 미배정</b> 토글</div></div>
        <div class="help-row"><span class="hk hk-csvup">CSV 올리기</span>
          <div class="help-desc">고사실별 운영 여부를 CSV로 업로드</div></div>
        <div class="help-row"><span class="hk hk-csvdown">CSV 양식 받기</span>
          <div class="help-desc">작성용 CSV 양식 내려받기 (현재 입력 내용 포함)</div></div>
        <div class="help-row"><span class="hk hk-danger">초기화</span>
          <div class="help-desc">입력된 배정값 지우기</div></div>
        <div class="help-note">
          <span class="nt-h">📄 CSV 열 설명</span>
          · <b>날짜, 교시</b> : 기본정보에서 값을 가져와서, 자동으로 채워짐 (수정 불필요)<br>
          · 값(예: 1)이 있으면 <b>감독 배정</b>, 비우면 <b>감독 미배정</b>
          </div>
        </div>
      </div>`,

    assign: `
      <div class="help-list">
        <div class="help-row"><span class="hk hk-primary">🚀 자동배정 실행</span>
          <div class="help-desc">누적된 업무강도 등 다양한 조건에 맞춰 감독 자동 배정</div></div>
        <div class="help-row">
          <span class="hk hk-outline">🚫 감독배정 제외</span>
          <span style="color:#9aa3b2;margin:0 4px">→</span>
          <span class="hk" style="background:#fbdada;border-color:#e3a3a3;color:#333">🚫 감독배정 제외</span>
          <div class="help-desc">버튼 켠 뒤 셀 선택 → 해당 시간에 감독 제외 (X표시된 <span style="color:red">빨간색 셀</span>)</div></div>
        <div class="help-row">
          <span class="hk hk-outline">📌 감독시간 고정</span>
          <span style="color:#9aa3b2;margin:0 4px">→</span>
          <span class="hk" style="background:#cfe3fa;border-color:#9dbfe6;color:#333">📌 감독시간 고정</span>
          <div class="help-desc">버튼 켠 뒤 셀 선택 → 해당시간에 감독 고정 (<span style="color:blue">파란색 셀</span>)<br>
          이후 우클릭으로 감독유형(1 = 정감독, 2 = 부감독) 지정필수</div></div>
        <div class="help-row"><span class="hk hk-outline">⇄ 선택 셀 교환</span>
          <div class="help-desc">두 셀 선택 후 서로 교환</div></div>
        <div class="help-row"><span class="hk hk-danger">배정 취소</span>
          <div class="help-desc">자동배정 결과만 취소 (감독배정제외 및 감독시간 고정은 유지)</div></div>
        <div class="help-row"><span class="hk hk-soft">변경 취소</span>
          <div class="help-desc">자동배정 후 실행한 모든 변경 되돌리기</div></div>
        <div class="help-row"><span class="hk hk-action">셀 더블클릭</span>
          <div class="help-desc">배정 결과 (감독실+시간) 고정, 기본핵심정보인 감독시간 고정과 달리 <b>보조 기능</b></div></div>
        <div class="help-note">
            <span class="nt-warn">⚠️ 주의</span><br>
            <b>🚫 감독배정 제외, 📌 감독시간 고정</b>은 모드 버튼으로, 활성화시켜야 작동<br>
          </div>
      </div>`,
  };
  window.openHelp = (key) => {
    document.getElementById('help-body').innerHTML = HELP[key] || '';
    document.getElementById('help-modal').style.display = 'flex';
  };
</script>

<!-- 헤더 -->
<header>
  <h1><span style="color:rgba(255,255,255,.6);font-weight:300;margin-left:1.5em">@JEONGKAPSU</span></h1>
  <div class="header-actions">
    <button class="btn-primary btn-icon" onclick="saveAll()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 3h11l3 3v11H3z"/>
        <rect x="6.5" y="3" width="5" height="4"/>
        <rect x="5.5" y="11" width="9" height="5"/>
      </svg>
      save
    </button>
    <button class="btn-outline btn-icon" onclick="saveAsNamed()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 3h11l3 3v11H3z"/>
        <rect x="6.5" y="3" width="5" height="4"/>
        <rect x="5.5" y="11" width="9" height="5"/>
      </svg>
      save as
    </button>
    <button class="btn-outline btn-icon" onclick="openLoadModal()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 6.5a1 1 0 0 1 1-1h3.5l1.2 1.6H16a1 1 0 0 1 1 1V15a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/>
      </svg>
      open
    </button>
    <button class="btn-danger" onclick="resetAll()">전체 초기화</button>
    <span id="auth-user" class="auth-user-badge" title="로그인 계정"></span>
    <button class="logout-btn" onclick="signOutApp()" title="로그아웃" aria-label="로그아웃">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 3v7"/>
        <path d="M6 5.5a6 6 0 1 0 8 0"/>
      </svg>
    </button>
  </div>
</header>

<!-- 탭 -->
<div class="tabs">
  <button class="tab-btn active" data-tab="tab-basic">⚙️ 기본정보</button>
  <button class="tab-btn" data-tab="tab-req">📝 배정설정</button>
  <button class="tab-btn" data-tab="tab-assign">🎯 자동배정</button>
  <button class="tab-btn" data-tab="tab-table">🖨️ 감독표</button>
  <span id="current-save-badge" class="save-badge"></span>
</div>

<!-- ══════════════════════════════════════════
     탭1: 기본정보
════════════════════════════════════════════ -->
<div id="tab-basic" class="tab-panel active">
  <div class="basic-grid">

    <!-- 상단 행: 시험일 및 고사실 + 감독유형 나란히 -->
    <div class="basic-top-row">

      <!-- 시험일 및 고사실 -->
      <div class="card basic-exam-card">
        <h2>📅 시험일 및 고사실 <button class="help-btn" onclick="openHelp('rooms')" title="도움말" aria-label="도움말">?</button></h2>
        <div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn-primary" onclick="addExamDay()">+ 날짜 추가</button>
          <label class="btn-csv-upload">
            고사실CSV 올리기
            <input type="file" accept=".csv" onchange="handleRoomCSV(event)" style="display:none">
          </label>
          <button class="btn-csv-download" onclick="downloadRoomCSVTemplate()">고사실 CSV 받기</button>
          <button class="btn-danger btn-sm" onclick="resetSection('examAndRooms')">초기화</button>
        </div>
        <div id="room-list" style="margin-bottom:10px"></div>
        <div style="overflow-x:auto">
          <table class="examday-table">
            <thead>
              <tr><th>날짜</th><th>시작교시</th><th>종료교시</th><th>삭제</th></tr>
            </thead>
            <tbody id="examday-list"></tbody>
          </table>
        </div>
      </div>

      <!-- 감독유형 및 업무강도 -->
      <div class="card basic-role-card">
        <h2>📌 감독유형 및 업무강도 <button class="help-btn" onclick="openHelp('roles')" title="도움말" aria-label="도움말">?</button></h2>
        <table>
          <thead>
            <tr><th>감독유형</th><th>업무강도</th><th></th></tr>
          </thead>
          <tbody id="role-list"></tbody>
        </table>
      </div>

    </div>

    <!-- 하단 행: 감독교사 목록 (전체 폭) -->
    <div class="card">
      <h2>🤖 감독교사 목록 <button class="help-btn" onclick="openHelp('teachers')" title="도움말" aria-label="도움말">?</button></h2>
      <div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-primary" onclick="addTeacher()">+ 교사 추가</button>
        <label class="btn-csv-upload">
          CSV 올리기
          <input type="file" accept=".csv" onchange="handleTeacherCSV(event)" style="display:none">
        </label>
        <button class="btn-csv-download" onclick="downloadTeacherCSVTemplate()">CSV 양식 받기</button>
        <button class="btn-outline" onclick="openPrevWorkloadPicker(this)">📊 이전누적강도 불러오기</button>
        <button class="btn-danger btn-sm" onclick="resetSection('teachers')">초기화</button>
      </div>
      <div style="overflow-x:auto;margin-top:8px">
        <div id="teacher-list-grid"></div>
      </div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════
     탭2: 배정설정
════════════════════════════════════════════ -->
<div id="tab-req" class="tab-panel">
  <div class="card">
    <h2>📝 시험장 운영 고사실 설정 <button class="help-btn" onclick="openHelp('req')" title="도움말" aria-label="도움말">?</button></h2>
    <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
      <label class="btn-csv-upload">
        CSV 올리기
        <input type="file" accept=".csv" onchange="handleRequirementsCSV(event)" style="display:none">
      </label>
      <button class="btn-csv-download" onclick="downloadRequirementsCSVTemplate()">CSV 양식 받기</button>
      <button class="btn-danger btn-sm" onclick="resetSection('requirements')">초기화</button>
    </div>
    <div id="req-table-wrap"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     탭3: 자동배정
════════════════════════════════════════════ -->
<div id="tab-assign" class="tab-panel">
  <div class="card">
    <h2>🎯 자동배정 <button class="help-btn" onclick="openHelp('assign')" title="도움말" aria-label="도움말">?</button></h2>
    <div class="assign-actions">
      <button id="btn-run" class="btn-run" onclick="runAssign()">🚀 자동배정 실행</button>
      <button id="btn-exclude-mode" class="btn-outline btn-mode" onclick="toggleExcludeMode()">🚫 감독배정 제외</button>
      <button id="btn-fixed-mode" class="btn-outline btn-mode" onclick="toggleFixedMode()">📌 감독시간 고정</button>
      <button id="btn-swap" class="btn-outline" onclick="doSwap()" disabled>⇄ 선택 셀 교환</button>
      <button class="btn-danger" onclick="cancelAssignment()">배정 취소</button>
      <button class="btn-danger btn-soft" onclick="resetAssignChanges()">변경 취소</button>
    </div>
    <div id="swap-history" style="margin-bottom:8px;display:flex;flex-wrap:wrap;gap:6px"></div>
    <div id="assign-grid-wrap">
      <p style="color:#7a8599">자동배정을 실행하거나 저장된 배정을 불러오세요.</p>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     탭4: 감독표
════════════════════════════════════════════ -->
<div id="tab-table" class="tab-panel">
  <div class="card">
    <h2>🖨️ 감독표 출력</h2>
    <div class="table-actions">
      <button class="btn-primary" onclick="printFull()">🖨️ 전체 감독표</button>
      <button class="btn-outline" onclick="printAllPersonal()">🖨️ 개인 (전체)</button>
      <span style="display:flex;align-items:center;gap:6px">
        <select id="personal-teacher-select" onchange="printPersonalByValue(this.value)" style="padding:5px 8px;border-radius:4px;border:1px solid #d0d7e3"></select>
      </span>
    </div>
    <div id="table-wrap" style="overflow-x:auto">
      <p style="color:#7a8599">배정 결과가 없습니다. 자동배정 탭에서 배정을 실행하세요.</p>
    </div>
  </div>
</div>

<!-- ── 서비스 워커 등록 ── -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker
        .register('./service-worker.js')
        .catch((error) => {
          console.error('서비스 워커 등록 실패:', error);
        });
    });
  }
</script>

<!-- ── JS (ES Module) ── -->
<script type="module">
  import { init } from './js/ui.js';
  init();
</script>
